<body>
    
    <header>
    <nav class="area-navegacao">
        <img class="Logo" src="Imagem/logo-tia-sonia.png" alt="logo do site" width="150px">

        <ul>

    <main class="area-cadastro">
        
           <section class="area-titulo">

        </section>
        

        <section class="area-login">
            <form action="#">

                <div class="login">
                    <label for="email"><i class="fa-solid fa-child"></i>Email</label>   
                    <input type="text" id="sobrenome" placeholder="Digite seu Email" required>

                </div>

                <div class="senha">
                        <label for="senha"><i class="fa-solid fa-user-lock"></i>Senha</label>
                        <input type="password" id="senha" placeholder="☼☼☼☼☼☼☼☼☼☼" required>

               </div>




               <div class="area-botao">
                    <button type="submit" id="botao-entrar">Entrar</button>
                    <a href="#" class="link-login"> Esqueceu sua Senha?</a>
                    <a href="cadastro.html" class="link-login"> ja possui uma conta? se não cadastrer?</a>
                </div>

            </form>






        </section>




    </main>
