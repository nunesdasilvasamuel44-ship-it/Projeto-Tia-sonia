<!DOCTYPE html>
<html lang="pt-br">

<head>

<body>

    <header>
        <nav>
            <img class="Logo" src="Imagem/logo-tia-sonia.png" alt="logo do site" width="150px">

            <ul>
                <li><a class="icones" href="#"><i class="fa-solid fa-house"></i></a></li>

                <li><a class="icones" href="#"><i class="fa-solid fa-pen-ruler"></i></a></li>

                <li><a class="icones" href="#"><i class="fa-solid fa-cart-shopping"></i></i></a></li>

                <li><a class="icones" href="#"><i class="fa-solid fa-user"></i></a></li>

            </ul>


        </nav>


    </header>


    <main>
        <article class="Area-banenr" >
            <section id="banner">

            </section>

            <section id="reservas">
                <h2 id="reservas__titulo">Vagas na semana Disponivel: 3</h2>

                <button id="reservas__botao">Reservar Vagas</button>
            </section>

        </article>
        <article class="Area-sobre">

            <section class="Sobre" >
                <h1 class="Sobre__Titulo" >Conheça Tia Sonia</h1>
                <p class="Sobre__texto">A tia Sônia, está super feliz em ter você por aqui. Ela borda todos os dias e ama o que faz, se você gosta de bordados como ela, visite o seu catalogo e conheça todos os bordados que ela já entregou.</p>
            </section>
        
        <section class="Sobre" >
            <img class="Sobre__foto" src="Imagem/tia-sonia.png" alt="Mulher com cabelo grisalio">
        </section>
        
        </article>
